{% load static %}
<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Kirjaudu — kävijätilastot</title>
  <link rel="icon" type="image/svg+xml" href="{% static 'trading/img/favicon.svg' %}" />
  <link rel="stylesheet" href="{% static 'trading/css/styles.css' %}" />
</head>
<body>
  <div class="app stats-page stats-login-page">
    <header class="header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="11" y="27" width="6" height="9" rx="1.6" fill="#ffffff" fill-opacity="0.92"/>
          <rect x="21" y="21" width="6" height="15" rx="1.6" fill="#ffffff" fill-opacity="0.92"/>
          <rect x="31" y="15" width="6" height="21" rx="1.6" fill="#ffffff" fill-opacity="0.92"/>
          <path d="M14 27 L24 21 L34 15 L40 9" fill="none" stroke="#4ade80" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M34 9 L40 9 L40 15" fill="none" stroke="#4ade80" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="header-body">
        <h1>Kävijätilastot</h1>
      </div>
    </header>

    <section class="panel stats-panel stats-login-panel">
      {% if error %}
      <p class="stats-login-error">{{ error }}</p>
      {% endif %}

      <form method="post" action="{% url 'stats_login' %}" class="stats-login-form">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}" />

        <label class="stats-login-label" for="username">Käyttäjätunnus</label>
        <input
          class="stats-login-input"
          id="username"
          name="username"
          type="text"
          autocomplete="username"
          required
          autofocus
        />

        <label class="stats-login-label" for="password">Salasana</label>
        <input
          class="stats-login-input"
          id="password"
          name="password"
          type="password"
          autocomplete="current-password"
          required
        />

        <button type="submit" class="btn btn-primary stats-login-btn">Kirjaudu</button>
      </form>

      <p class="stats-footer-note">
        <a href="/" rel="nofollow noopener">← Etusivu</a>
      </p>
    </section>
  </div>
</body>
</html>
