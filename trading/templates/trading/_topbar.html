<div class="top-bar">
  <div class="top-bar-left">
    <button
      type="button"
      class="hamburger-btn"
      id="topbar-menu-toggle"
      aria-haspopup="true"
      aria-expanded="false"
      aria-controls="topbar-menu"
      aria-label="{{ nav.menu_aria }}"
    >
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
        <path d="M3 6h18M3 12h18M3 18h18"/>
      </svg>
    </button>
    <nav class="top-bar-menu" id="topbar-menu" aria-label="{{ nav.nav_aria }}" hidden>
      <a
        href="{{ nav.home_href }}"
        class="top-bar-menu-link{% if nav.current == 'home' %} is-active{% endif %}"
        {% if nav.current == 'home' %}aria-current="page"{% endif %}
      >{{ nav.home_label }}</a>
      <a
        href="{{ nav.changelog_href }}"
        class="top-bar-menu-link{% if nav.current == 'changelog' %} is-active{% endif %}"
        {% if nav.current == 'changelog' %}aria-current="page"{% endif %}
      >{{ nav.changelog_label }}</a>
      <a
        href="{{ nav.explorer_href }}"
        class="top-bar-menu-link{% if nav.current == 'explorer' %} is-active{% endif %}"
        {% if nav.current == 'explorer' %}aria-current="page"{% endif %}
      >{{ nav.explorer_label }}</a>
    </nav>
  </div>
  <div class="top-bar-right">
    <nav class="share-icons top-bar-share" aria-label="{{ nav.share_nav_aria }}">
      <a class="share-icon-btn share-icon-btn--whatsapp" data-share-platform="whatsapp" href="{{ share.whatsapp }}" target="_blank" rel="noopener noreferrer" title="{{ nav.share_whatsapp }}">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true">
          <path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.39 1.26 4.82L2 22l5.36-1.36a9.9 9.9 0 0 0 4.68 1.19h.01c5.46 0 9.9-4.45 9.9-9.91C21.95 6.45 17.5 2 12.04 2zm5.86 14.19c-.24.68-1.4 1.32-1.93 1.4-.5.08-1.14.11-1.83-.11-.42-.13-.96-.31-1.65-.6-2.9-1.25-4.79-4.17-4.94-4.36-.14-.19-1.18-1.57-1.18-3s.75-2.13 1.02-2.42c.26-.29.57-.36.76-.36h.55c.18 0 .42-.07.65.5.24.58.82 2 .89 2.15.07.15.11.32.02.51-.09.19-.14.31-.28.47-.14.16-.29.36-.42.48-.14.13-.28.27-.12.53.16.26.71 1.17 1.53 1.9 1.05.94 1.94 1.23 2.2 1.37.26.14.42.12.57-.07.15-.19.65-.76.82-1.02.17-.26.34-.21.57-.13.24.09 1.5.71 1.76.84.26.13.43.19.5.3.07.11.07.63-.17 1.31z"/>
        </svg>
        <span class="visually-hidden">{{ nav.share_whatsapp }}</span>
      </a>
      <a class="share-icon-btn share-icon-btn--facebook" data-share-platform="facebook" href="{{ share.facebook }}" target="_blank" rel="noopener noreferrer" title="{{ nav.share_facebook }}">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true">
          <path d="M22 12a10 10 0 1 0-11.5 9.95v-7.04H7.9V12h2.6V9.8c0-2.56 1.53-3.98 3.87-3.98 1.12 0 2.29.2 2.29.2v2.5h-1.29c-1.27 0-1.67.79-1.67 1.6V12h2.84l-.45 2.91h-2.39v7.04A10 10 0 0 0 22 12z"/>
        </svg>
        <span class="visually-hidden">{{ nav.share_facebook }}</span>
      </a>
      <a class="share-icon-btn share-icon-btn--x" data-share-platform="x" href="{{ share.x }}" target="_blank" rel="noopener noreferrer" title="{{ nav.share_x }}">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" aria-hidden="true">
          <path d="M18.24 3H21l-6.6 7.54L22 21h-6.19l-4.84-6.24L5.4 21H2.6l7.06-8.07L2 3h6.34l4.38 5.72L18.24 3zm-1.08 16.17h1.72L7.9 4.73H6.05l11.11 14.44z"/>
        </svg>
        <span class="visually-hidden">{{ nav.share_x }}</span>
      </a>
      <a class="share-icon-btn share-icon-btn--linkedin" data-share-platform="linkedin" href="{{ share.linkedin }}" target="_blank" rel="noopener noreferrer" title="{{ nav.share_linkedin }}">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true">
          <path d="M20.45 20.45h-3.56v-5.57c0-1.33-.02-3.04-1.85-3.04-1.86 0-2.14 1.45-2.14 2.94v5.67H9.34V9h3.42v1.56h.05c.48-.9 1.64-1.85 3.38-1.85 3.6 0 4.27 2.37 4.27 5.45v6.29zM5.34 7.43a2.07 2.07 0 1 1 0-4.14 2.07 2.07 0 0 1 0 4.14zM7.12 20.45H3.56V9h3.56v11.45z"/>
        </svg>
        <span class="visually-hidden">{{ nav.share_linkedin }}</span>
      </a>
    </nav>
  </div>
</div>
